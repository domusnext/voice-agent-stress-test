# ---- 传输模式 ----
transport: "grpc"                # "daily" | "grpc"

# ---- 目标服务（Daily 模式）----
server:
  # url: "https://dev-voice-agent.example.com"  # 替换为实际地址
  url: ""               # 本地测试

# ---- gRPC 配置（gRPC 模式）----
grpc:
  host: "localhost:8085"                # gRPC server 地址
  #host: "speed.heynori.com:443"   # 远程测试
  #host: "speed.smart-domi.app:443"   # 远程测试
  #tls: true                            # 远程 TLS 连接设为 true，本地测试设为 false
  tls: false
  device_id: "test1"       # 可选，默认自动生成
  audio_encoding: "pcm"                 # "pcm" | "opus"
  voice_key: ""                         # 可选，TTS 语音选择（空=服务端默认）
  stt_key: ""                           # 可选，STT 模型选择：nova3 | flux | seed | 空=服务端默认

# ---- 认证（两种模式共用）----
auth:
  token: "Bearer eyJhbGciOiJIUzI1NiIsImtpZCI6Ikd2VE5GamxSVlJBdTRUanAiLCJ0eXAiOiJKV1QifQ.-.buP7UeMVudFk2PS1y1Qw4DScIEQrmlLpdDoulMaSocg"
  family_id: "6adf918a-dc5f-4094-822b-8aef5570d230"          # 测试 family UUID（必填）
  user_id: "be5682c7-5d18-40f3-86ca-9999bd628e4f"            # 测试 user UUID（必填）
  timezone: "Asia/Shanghai"

# ---- 测试参数 ----
test:
  audio_file: "audio/question_greeting.wav"   # 每轮播放的音频
  max_wait_response: 100.0                      # 等待 bot 离开房间的超时（秒）
  ramp_up_secs: 10.0                           # 全部 worker 启动所需时间
  cooldown_between_levels: 60                  # 不同并发度之间的冷却（秒）
  sample_rate: 16000                           # 音频采样率

# ---- 并发度梯度 ----
levels:
  - name: "baseline"
    concurrency: 1
    duration_secs: 60
  - name: "low"
    concurrency: 13
    duration_secs: 300
  - name: "medium"
    concurrency: 20
    duration_secs: 36000
  - name: "high"
    concurrency: 50
    duration_secs: 300
  - name: "peak"
    concurrency: 100
    duration_secs: 300

# ---- CloudWatch 指标采集 ----
cloudwatch:
  region: "us-east-1"                          # AWS Region
  log_group: "/ecs/domus/prod/voice-agent"      # CloudWatch Log Group 名称
  profile: "domus-prod"                         # 可选：AWS CLI profile 名称，空则使用默认凭证链

# ---- 自动递增并发度方案 ----
ramp:
  enabled: false          # true 时 run.py 走 ramp 模式（也可用 --ramp 命令行开启）
  start: 1                # 起始并发度（基准并发度）
  step: 2                 # 每级线性递增的并发度（固定步长）
  max: 30                 # 并发度上限（安全阀，到顶即停）
  hold_secs: 300          # 每个递增级别的维持时长
  cooldown_secs: 30       # 级别间冷却

  # ── 基准建立（阶段一，concurrency=1 多测几次、每次更久）──
  baseline_repeats: 3         # 并发度1重复轮数，汇总所有轮样本得稳健基准
  baseline_hold_secs: 600     # 基准每轮时长

  # ── 服务端指标来源 ──
  server_metrics:
    source: "local_log"       # cloudwatch | local_log
    local_log_path: "/Users/lihaicheng/duomi_workspace/domi-voice-agent/logs/app.log"

  judge:
    # ── 主判据 A：响应延迟（与「基准带」比较）──
    band_rel_margin: 0.20       # 相对裕度
    band_mad_k: 3.0             # MAD 倍数
    degrade_band_ratio: 1.0     # 越过 band_high × 此值 → 预警
    fail_band_ratio: 1.5        # 越过 band_high × 此值 → 超载

    # ── 主判据 B：会话成功率 / 错误 / 会话丢失 ──
    session_success_fail: 0.90
    session_success_degrade: 0.98
    error_count_fail: 1
    session_lost_ratio_fail: 0.05

    # ── 辅助信号：帧率（仅归因，不单独定超载）──
    poor_frame_rate_threshold: 40
    low_fps_ratio_attn: 0.10
    poor_conn_ratio_attn: 0.05
    poor_conn_count_attn: 0
    send_pace_ratio_unreliable: 1.2

    degrade_streak_fail: 2      # 连续 N 个"预警"视为"超载"
    min_windows: 5

# ---- CloudWatch 指标采集 ----
cloudwatch_dev:
  region: "us-east-1"                          # AWS Region
  log_group: "/ecs/domus/dev/voice-agent"      # CloudWatch Log Group 名称
  profile: "domus-dev"                         # 可选：AWS CLI profile 名称，空则使用默认凭证链
